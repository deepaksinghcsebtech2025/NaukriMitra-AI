services:
  - type: web
    name: ultra-job-agent
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
