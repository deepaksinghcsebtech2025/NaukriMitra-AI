name: CI/CD Ultra Job Agent

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint and Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile \
            core/auth.py core/config.py core/database.py core/salary.py \
            core/startup.py core/llm.py core/cache.py \
            agents/base.py agents/scraper.py agents/filter.py \
            agents/resume.py agents/apply.py agents/notifier.py \
            dashboard/app.py
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_api.py || true
        env:
          SUPABASE_URL: ""
          SUPABASE_KEY: ""
          OPENROUTER_API_KEY: ""

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ultra-job-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.RENDER_DEPLOY_HOOK_URL != ''
    steps:
      - name: Trigger Render deploy
        run: |
          curl -sX POST "${{ vars.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail --retry 3 --retry-delay 5
